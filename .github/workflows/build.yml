name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger - phone থেকে চালানো যাবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔑 Make Gradle executable
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GovJobAutofill-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Build Success Summary
        run: |
          echo "## ✅ APK Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "**App:** সরকারি চাকরি অটোফিল" >> $GITHUB_STEP_SUMMARY
          echo "**File:** app-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** Actions > এই Run > Artifacts" >> $GITHUB_STEP_SUMMARY
